<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وكالة حدوتة للدعاية والإعلان</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* أنميشن الدخول */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* --- مكان تغيير الخلفية --- */
            background-image: img src="logo (2).png" ; /* حط رابط صورتك هنا */
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* بيخلي الخلفية ثابتة والكارت بيتحرك فوقها */
            position: relative;
        }

        /* طبقة حماية عشان الكلام يبان فوق أي صورة خلفية */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 4, 94, 0.6); /* لون بنفسجي غامق شفاف */
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2; /* عشان تظهر فوق طبقة الحماية */
            background: rgba(255, 255, 255, 0.3); /* شفافية عالية للزجاج */
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            padding: 2.5rem 2rem;
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 1.2rem;
        }

        h2 { 
            margin-bottom: 0.5rem; 
            color: #fff; /* غيرت اللون للأبيض عشان يليق مع الخلفية الغامقة */
            font-size: 1.5rem;  
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p {
            margin-top: 0;
            margin-bottom: 2rem; 
            color: rgba(255, 255, 255, 0.9); 
            font-size: 1rem;
            line-height: 1.5;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            text-decoration: none;
            color: white;
            padding: 13px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center; 
            flex-direction: row-reverse; 
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* تأخير الأنميشن للأزرار */
        .link-item:nth-child(1) { animation-delay: 0.3s; }
        .link-item:nth-child(2) { animation-delay: 0.4s; }
        .link-item:nth-child(3) { animation-delay: 0.5s; }
        .link-item:nth-child(4) { animation-delay: 0.6s; }
        .link-item:nth-child(5) { animation-delay: 0.7s; }

        .link-item:hover { 
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            filter: brightness(1.2);
        }

        /* ألوان الأزرار */
        .facebook { background-color: #1877F2; }
        .whatsapp { background-color: #25D366; }
        .call     { background-color: #f39c12; } /* لون برتقالي مميز للاتصال */
        .email    { background-color: #EA4335; }
        .location { background-color: #3498db; }

        .footer {
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            animation: fadeInUp 0.5s ease-out 1s forwards;
            opacity: 0;
        }
        .footer a { color: #fff; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <img src="logo.jpg" alt="حدوتة للدعاية والإعلان" class="profile-img">
    
    <h2>وكالة حدوتة للدعاية والإعلان</h2>
    <p>احنا شركة بتقدم خدمات إعلانية متكاملة<br>يعنى كل ما يخص الدعاية والإعلان</p>

    <div class="links-container">
        <a href="https://www.facebook.com/hadotamasrya65" class="link-item facebook">
            <i class="fab fa-facebook-f"></i>
            <span>فيسبوك</span>
        </a>

        <a href="https://wa.me/+201099994516" class="link-item whatsapp">
            <i class="fab fa-whatsapp"></i>
            <span>واتساب</span>
        </a>

        <a href="tel:+201099994516" class="link-item call">
            <i class="fas fa-phone"></i>
            <span>اتصل بنا الآن</span>
        </a>

        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=printmisr@gmail.com" class="link-item email">
            <i class="fas fa-envelope"></i>
            <span>البريد الإلكتروني</span>
        </a>

        <a href="https://maps.app.goo.gl/geeQvLSTWtkvQ63TA?g_st=aw" class="link-item location">
            <i class="fas fa-map-marker-alt"></i>
            <span>موقعنا</span>
        </a>
    </div>

    <div class="footer">
        Des. by: Mansour khalifa<br>
        <a href="https://link.gettap.co/mnswrkhlyfh8103175" target="_blank">Get in touch with us</a>
    </div>
</div>

</body>
</html>
